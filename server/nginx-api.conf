# Installed to /etc/nginx/default.d/ (server context) by server/install.sh

# HubSpot proxy — the only dynamic endpoint on the site
location = /api/hubspot {
    limit_req zone=helm_hubspot burst=10 nodelay;
    client_max_body_size 16k;
    proxy_pass http://127.0.0.1:8081;
    proxy_set_header X-Real-IP $remote_addr;
}

# Never serve hidden files (.git etc.) from the web root
location ~ /\. {
    deny all;
}
